[tox]
envlist = code
minversion = 2.0

[pytest]
testpaths = tests
asyncio_default_fixture_loop_scope = function

[testenv:code]
basepython = python3
deps=
    pytest
    pytest-asyncio
    pytest-cov
    pytest-mock
    -r requirements.txt
commands =
    # posargs allows running just a single test like this:
    # tox -- tests/test_foo.py::test_bar
    pytest --cov hello --cov-report term-missing --cov-fail-under=70 {posargs}
